<div id="app"></div>
<style>
  #app, #app * { box-sizing: border-box; }
  #app {
    --bg: #0f1115;
    --surface: #171a21;
    --surface-2: #1f232c;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #8b909c;
    --added: #5fb87a;
    --removed: #e5675f;
    --removed-soft: rgba(229, 103, 95, 0.16);
    --accent: #d8a13a;

    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    border-radius: 14px;
    padding: 28px;
    max-width: 960px;
    margin: 0 auto;
    line-height: 1.45;
  }

  #app .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; }
  #app code { font-family: 'JetBrains Mono', monospace; background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 0.92em; }

  #app .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 0 0 4px; }
  #app h1 { font-family: 'JetBrains Mono', monospace; font-size: 22px; margin: 0 0 4px; font-weight: 700; }
  #app .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 22px; }

  #app .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; }
  #app .panel-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  #app .panel-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  #app .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  #app input[type="text"], #app input[type="password"] {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 9px 11px; font-size: 13.5px; font-family: inherit;
    outline: none; flex: 1; min-width: 160px;
  }
  #app input::placeholder { color: #5b6170; }
  #app input:focus { border-color: var(--accent); }

  #app button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 9px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: border-color 0.15s, background 0.15s; white-space: nowrap;
  }
  #app button:hover { border-color: var(--accent); }
  #app button.primary { background: var(--accent); color: #1a1305; border-color: var(--accent); }
  #app button.primary:hover { filter: brightness(1.08); }
  #app button:disabled { opacity: 0.5; cursor: not-allowed; }

  #app .hint { font-size: 11.5px; color: var(--muted); margin-top: 6px; }
  #app .warning-box {
    display: none; margin-top: 10px; padding: 10px 12px;
    border: 1px solid var(--removed); border-radius: 7px;
    background: var(--removed-soft); font-size: 12px; line-height: 1.5;
  }
  #app .warning-box strong { color: var(--removed); }

  #app .repo-info { background: var(--surface-2); border-radius: 9px; padding: 12px 14px; margin-bottom: 4px; }
  #app .repo-name { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
  #app .repo-name a { color: var(--accent); text-decoration: none; }
  #app .repo-name a:hover { text-decoration: underline; }
  #app .repo-meta { color: var(--muted); font-size: 11.5px; margin-top: 4px; }
  #app .repo-meta .added { color: var(--added); font-weight: 600; }
  #app .repo-meta .removed { color: var(--removed); font-weight: 600; }

  #app table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 12px; }
  #app th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  #app td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  #app tr:last-child td { border-bottom: none; }
  #app tr:hover td { background: rgba(255,255,255,0.02); }

  #app .td-num { color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  #app .td-sha { font-family: 'JetBrains Mono', monospace; }
  #app .td-sha a { color: var(--accent); text-decoration: none; }
  #app .td-sha a:hover { text-decoration: underline; }
  #app .td-num a { color: var(--muted); text-decoration: none; }
  #app .td-num a:hover { color: var(--accent); text-decoration: underline; }
  #app .td-date { font-family: 'JetBrains Mono', monospace; white-space: nowrap; color: var(--muted); }
  #app .td-subject { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #app .stat-added { color: var(--added); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  #app .stat-removed { color: var(--removed); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  #app .diffbar { display: flex; height: 6px; width: 80px; border-radius: 3px; overflow: hidden; background: var(--border); }
  #app .diffbar .a { background: var(--added); }
  #app .diffbar .r { background: var(--removed); }

  #app .totals-row { display: flex; gap: 24px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  #app .totals-row .ti { font-size: 12px; color: var(--muted); }
  #app .totals-row .ti span { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  #app .totals-row .ti .a { color: var(--added); }
  #app .totals-row .ti .r { color: var(--removed); }

  #app .empty { color: var(--muted); font-size: 13px; padding: 6px 0; }
  #app .status-line { font-size: 11.5px; color: var(--muted); margin-top: 14px; text-align: right; min-height: 18px; }
  #app .status-line.error { color: var(--removed); }
  #app .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #app .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  #app .filter-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  #app input[type="date"] {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit;
    outline: none; color-scheme: dark;
  }
  #app input[type="date"]:focus { border-color: var(--accent); }
  #app .filter-badge {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    background: rgba(216,161,58,0.15); color: var(--accent);
    border: 1px solid rgba(216,161,58,0.3); border-radius: 5px;
    padding: 2px 7px; white-space: nowrap;
  }
  #app button.ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 7px 8px; font-size: 12px; }
  #app button.ghost:hover { color: var(--removed); border-color: var(--removed); background: transparent; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script>
(function () {
  const app = document.getElementById('app');
  let SB_URL = '';
  let SB_KEY = '';
  let pendingServiceRoleConfirm = false;
  let connected = false;
  // repoKey -> { repo, commits[] } — datos completos en memoria para filtrar sin red
  const cache = {};

  // ------------------------------------------------------------------
  // Almacenamiento persistente (Claude.ai) o en memoria como fallback
  // ------------------------------------------------------------------
  const hasPersistentStorage = typeof window !== 'undefined' && window.storage &&
    typeof window.storage.get === 'function';
  const mem = {};
  const store = hasPersistentStorage ? window.storage : {
    async get(k)      { if (!(k in mem)) throw new Error('not found'); return { value: mem[k] }; },
    async set(k, v)   { mem[k] = v; return { value: v }; },
  };
  async function loadCfg() {
    try { const r = await store.get('sb_cfg'); return r ? JSON.parse(r.value) : null; } catch { return null; }
  }
  async function saveCfg(url, key) {
    try { await store.set('sb_cfg', JSON.stringify({ url, key })); } catch {}
  }

  // ------------------------------------------------------------------
  // Helpers
  // ------------------------------------------------------------------
  function normalizeKey(input) {
    const s = input.trim().replace(/\.git$/, '').replace(/\/$/, '');
    const m = s.match(/(?:https?:\/\/github\.com\/|git@github\.com:)([^/\s]+\/[^/\s]+)$/) ||
              s.match(/^([^/\s]+\/[^/\s]+)$/);
    return m ? m[1] : null;
  }
  function repoUrl(key) { return 'https://github.com/' + key; }
  function commitUrl(key, sha) { return 'https://github.com/' + key + '/commit/' + sha; }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function fmtRelative(iso) {
    if (!iso) return 'nunca';
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 1) return 'ahora mismo';
    if (m < 60) return 'hace ' + m + ' min';
    const h = Math.floor(m / 60);
    if (h < 24) return 'hace ' + h + ' h';
    return 'hace ' + Math.floor(h / 24) + ' d';
  }
  function setStatus(msg, isError) {
    const el = document.getElementById('statusLine');
    el.textContent = msg;
    el.className = 'status-line' + (isError ? ' error' : '');
  }
  function decodeJwtRole(token) {
    try {
      const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      return JSON.parse(decodeURIComponent(atob(b64).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''))).role || null;
    } catch { return null; }
  }

  // ------------------------------------------------------------------
  // Supabase client
  // ------------------------------------------------------------------
  async function sbGet(table, params) {
    const qs = new URLSearchParams(params).toString();
    const url = SB_URL.replace(/\/$/, '') + '/rest/v1/' + table + (qs ? '?' + qs : '');
    let res;
    try {
      res = await fetch(url, { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } });
    } catch (e) {
      throw new Error('No se pudo conectar a Supabase. Revisa la URL.');
    }
    if (!res.ok) {
      let d = ''; try { const j = await res.json(); d = j.message || j.hint || ''; } catch {}
      if (res.status === 401 || res.status === 403)
        throw new Error('Key rechazada (' + res.status + '). Revisa que sea la anon key y que hayas creado las políticas RLS de supabase_schema.sql. ' + d);
      if (res.status === 404)
        throw new Error('Tablas no encontradas. Ejecuta primero supabase_schema.sql.');
      throw new Error('Error Supabase (' + res.status + '): ' + d);
    }
    return res.json();
  }

  async function fetchRepo(key) {
    const rows = await sbGet('repo_tracker_repos', { select: '*', key: 'eq.' + key });
    return rows[0] || null;
  }
  async function fetchCommits(key) {
    const rows = await sbGet('repo_tracker_commits', { select: '*', repo_key: 'eq.' + key, order: 'num.asc' });
    return rows.map(r => ({ num: r.num, sha: r.sha, date: r.commit_date, subject: r.subject || '', added: r.added, removed: r.removed }));
  }

  // ------------------------------------------------------------------
  // Render
  // ------------------------------------------------------------------
  function buildRows(key, commits) {
    if (!commits.length) return '<tr><td colspan="7" class="empty" style="text-align:center;">Sin commits en el rango seleccionado.</td></tr>';
    const maxChange = Math.max(1, ...commits.map(c => c.added + c.removed));
    return commits.map(c => {
      const aPct = Math.round(c.added / maxChange * 100);
      const rPct = Math.round(c.removed / maxChange * 100);
      const url = commitUrl(key, c.sha);
      return '<tr>' +
        '<td class="td-num"><a href="' + url + '" target="_blank" rel="noopener">' + c.num + '</a></td>' +
        '<td class="td-sha"><a href="' + url + '" target="_blank" rel="noopener">' + c.sha.slice(0, 7) + '</a></td>' +
        '<td class="td-date">' + fmtDate(c.date) + '</td>' +
        '<td class="td-subject">' + escHtml(c.subject) + '</td>' +
        '<td class="stat-added">+' + c.added + '</td>' +
        '<td class="stat-removed">-' + c.removed + '</td>' +
        '<td><div class="diffbar"><span class="a" style="width:' + aPct + '%"></span><span class="r" style="width:' + rPct + '%"></span></div></td>' +
      '</tr>';
    }).join('');
  }

  function applyFilter(key) {
    const { commits } = cache[key];
    const fromVal = document.getElementById('filter-from-' + cssId(key)).value;
    const toVal   = document.getElementById('filter-to-'   + cssId(key)).value;
    const from = fromVal ? new Date(fromVal + 'T00:00:00') : null;
    const to   = toVal   ? new Date(toVal   + 'T23:59:59') : null;

    const filtered = commits.filter(c => {
      const d = new Date(c.date);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });

    const totalAdded   = filtered.reduce((s, c) => s + c.added,   0);
    const totalRemoved = filtered.reduce((s, c) => s + c.removed, 0);
    const isFiltered   = from || to;

    document.getElementById('tbody-' + cssId(key)).innerHTML = buildRows(key, filtered);
    document.getElementById('totals-' + cssId(key)).innerHTML =
      '<div class="ti"><span class="a">+' + totalAdded   + '</span> líneas añadidas</div>' +
      '<div class="ti"><span class="r">-' + totalRemoved + '</span> líneas eliminadas</div>' +
      '<div class="ti">' + filtered.length + (isFiltered ? ' de ' + commits.length : '') + ' commits</div>' +
      (isFiltered ? '<span class="filter-badge">filtrado por fecha</span>' : '');
  }

  function cssId(key) { return key.replace(/[^a-z0-9]/gi, '_'); }

  function renderResult(key, repo, commits) {
    const area   = document.getElementById('resultsArea');
    const ghUrl  = repoUrl(key);
    const id     = 'result-' + cssId(key);
    const old    = document.getElementById(id);
    if (old) old.remove();

    const totalAdded   = commits.reduce((s, c) => s + c.added,   0);
    const totalRemoved = commits.reduce((s, c) => s + c.removed, 0);
    const cid = cssId(key);

    const div = document.createElement('div');
    div.className = 'panel';
    div.id = id;
    div.innerHTML =
      '<div class="repo-info">' +
        '<div class="repo-name"><a href="' + ghUrl + '" target="_blank" rel="noopener">' + escHtml(key) + '</a></div>' +
        '<div class="repo-meta">' +
          'rama <strong>' + escHtml(repo.branch) + '</strong>' +
          ' &middot; ' + (repo.commit_count || 0) + ' commits totales' +
          ' &middot; última comprobación: ' + fmtRelative(repo.last_checked) +
        '</div>' +
      '</div>' +
      (commits.length === 0
        ? '<div class="empty">No hay commits registrados todavía para este repositorio.</div>'
        :
        '<div class="filter-bar">' +
          '<label>Desde</label>' +
          '<input type="date" id="filter-from-' + cid + '">' +
          '<label>Hasta</label>' +
          '<input type="date" id="filter-to-' + cid + '">' +
          '<button class="ghost" id="filter-clear-' + cid + '">✕ Limpiar</button>' +
        '</div>' +
        '<table><thead><tr><th>#</th><th>Commit</th><th>Fecha</th><th>Mensaje</th><th>Añadidas</th><th>Eliminadas</th><th></th></tr></thead>' +
        '<tbody id="tbody-' + cid + '">' + buildRows(key, commits) + '</tbody></table>' +
        '<div class="totals-row" id="totals-' + cid + '">' +
          '<div class="ti"><span class="a">+' + totalAdded   + '</span> líneas añadidas</div>' +
          '<div class="ti"><span class="r">-' + totalRemoved + '</span> líneas eliminadas</div>' +
          '<div class="ti">' + commits.length + ' commits</div>' +
        '</div>'
      );
    area.prepend(div);

    if (commits.length > 0) {
      const fromEl  = document.getElementById('filter-from-' + cid);
      const toEl    = document.getElementById('filter-to-'   + cid);
      const clearEl = document.getElementById('filter-clear-' + cid);
      fromEl.addEventListener('change',  () => applyFilter(key));
      toEl.addEventListener('change',    () => applyFilter(key));
      clearEl.addEventListener('click',  () => { fromEl.value = ''; toEl.value = ''; applyFilter(key); });
    }
  }

  // ------------------------------------------------------------------
  // Actions
  // ------------------------------------------------------------------
  async function handleConnect() {
    const url = document.getElementById('sbUrl').value.trim();
    const key = document.getElementById('sbKey').value.trim();
    const warn = document.getElementById('keyWarning');
    const btn  = document.getElementById('connectBtn');
    if (!url || !key) { setStatus('Introduce la URL y la key de Supabase.', true); return; }
    const role = decodeJwtRole(key);
    if (role === 'service_role' && !pendingServiceRoleConfirm) {
      warn.style.display = 'block';
      btn.textContent = 'Conectar igualmente';
      pendingServiceRoleConfirm = true;
      setStatus('Revisa el aviso antes de continuar.', true);
      return;
    }
    pendingServiceRoleConfirm = false;
    btn.textContent = 'Conectar';
    warn.style.display = role === 'service_role' ? 'block' : 'none';
    SB_URL = url; SB_KEY = key;
    if (role !== 'service_role') await saveCfg(url, key);
    connected = true;
    document.getElementById('queryPanel').style.display = '';
    setStatus('Conectado a Supabase. Introduce una URL de repositorio.');
  }

  async function handleQuery() {
    if (!connected) { setStatus('Conéctate a Supabase primero.', true); return; }
    const input = document.getElementById('repoInput');
    const btn   = document.getElementById('queryBtn');
    const key   = normalizeKey(input.value);
    if (!key) { setStatus('URL no válida. Usa https://github.com/owner/repo o simplemente owner/repo.', true); return; }
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Cargando';
    setStatus('Consultando Supabase...');
    try {
      const [repo, commits] = await Promise.all([fetchRepo(key), fetchCommits(key)]);
      if (!repo) {
        setStatus('"' + key + '" no existe en Supabase. ¿Has ejecutado "add" y "check" con el script Python?', true);
        return;
      }
      cache[key] = { repo, commits };
      renderResult(key, repo, commits);
      setStatus(commits.length + ' commit(s) cargado(s) para ' + key + '.');
    } catch (e) {
      setStatus(e.message, true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  }

  // ------------------------------------------------------------------
  // Layout
  // ------------------------------------------------------------------
  app.innerHTML =
    '<p class="eyebrow">visor de supabase</p>' +
    '<h1>Commit tracker</h1>' +
    '<p class="sub">Muestra los commits guardados en Supabase por el script Python. Solo lectura, sin peticiones a GitHub.</p>' +

    (hasPersistentStorage ? '' :
      '<div class="panel" style="border-color:var(--accent);">' +
        '<p class="panel-title" style="color:var(--accent);margin-bottom:4px;"><span class="dot"></span>Sin almacenamiento persistente</p>' +
        '<p class="hint" style="margin:0;">Archivo abierto fuera de Claude.ai: funciona igual pero pedirá las credenciales al recargar.</p>' +
      '</div>') +

    '<div class="panel" id="connectPanel">' +
      '<p class="panel-title"><span class="dot"></span>Conexión a Supabase</p>' +
      '<div class="row">' +
        '<input id="sbUrl" type="text" placeholder="https://tu-proyecto.supabase.co">' +
        '<input id="sbKey" type="password" placeholder="anon / public key">' +
        '<button class="primary" id="connectBtn">Conectar</button>' +
      '</div>' +
      '<div id="keyWarning" class="warning-box">' +
        '<strong>Atención:</strong> parece una <code>service_role</code> key, que da acceso total de escritura. ' +
        'Usa la <code>anon</code> key junto con las políticas RLS del paso 2 de <code>supabase_schema.sql</code>. ' +
        'Pulsa "Conectar igualmente" solo si sabes lo que haces.' +
      '</div>' +
      '<p class="hint">Usa la <strong>anon / public key</strong> (Project Settings → API). La service_role nunca debe ir en el navegador.</p>' +
    '</div>' +

    '<div class="panel" id="queryPanel" style="display:none;">' +
      '<p class="panel-title"><span class="dot"></span>Buscar repositorio</p>' +
      '<div class="row">' +
        '<input id="repoInput" type="text" placeholder="https://github.com/owner/repo  o  owner/repo">' +
        '<button class="primary" id="queryBtn">Ver historial</button>' +
      '</div>' +
      '<p class="hint">El repositorio debe haber sido añadido y comprobado previamente con el script Python.</p>' +
    '</div>' +

    '<div id="resultsArea"></div>' +
    '<div class="status-line" id="statusLine"></div>';

  document.getElementById('connectBtn').addEventListener('click', handleConnect);
  document.getElementById('queryBtn').addEventListener('click', handleQuery);
  document.getElementById('repoInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleQuery(); });
  ['sbUrl', 'sbKey'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleConnect(); })
  );

  (async () => {
    const cfg = await loadCfg();
    if (cfg && cfg.url && cfg.key) {
      document.getElementById('sbUrl').value = cfg.url;
      document.getElementById('sbKey').value = cfg.key;
      SB_URL = cfg.url; SB_KEY = cfg.key;
      connected = true;
      document.getElementById('queryPanel').style.display = '';
      setStatus('Conexión restaurada. Introduce una URL de repositorio.');
    }
  })();
})();
</script>
